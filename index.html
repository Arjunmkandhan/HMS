<!doctype html>
<html lang="en">
  <head>
    <!-- HTML entry file:
         Vite serves this file first, and React mounts into the `root` div below.
         If someone asks where the website starts in plain HTML, this is the file to show. -->
    <meta charset="UTF-8" />
    <!-- Browser tab icon shown for the website. -->
    <link rel="icon" type="image/svg+xml" href="/hospital.png" />
    <!-- Makes the page responsive on mobile devices. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMS Project</title>
  </head>
  <body>
    <!-- React injects the entire application UI inside this container. -->
    <div id="root"></div>
    <!-- Main JavaScript entry point that bootstraps the React app. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
